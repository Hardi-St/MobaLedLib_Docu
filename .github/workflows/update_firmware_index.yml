name: Update Firmware Index

on:
  push:
    branches: [ main ]  # Adjust the branch if needed
    paths: [ 'firmware/**' ]  # Recursive: Trigger on changes in firmware/ and all subdirectories
  workflow_dispatch:  # Allow manual triggering

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Force Node.js 24 for all actions

jobs:
  updateFirmwareIndex:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository (Sparse)
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          sparse-checkout: |
            firmware/
            scripts/  # Add scripts/ to checkout the update script
          sparse-checkout-cone-mode: true

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Run Update Script
        run: python .github/scripts/update_firmware_index.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add firmware/index.json
          git commit -m 'Automatically: Update firmware/index.json' || echo "No changes to commit"
          git push
          
          
          